<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wollo Uni Info Hub - KIOT</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Wollo University</h1>
            <h2>Kombolcha Institute of Technology (KIOT)</h2>
            <p>Freshman Student Info Hub</p>
        </header>

        <main>
            <div class="selection-group">
                <label>ሴክሽን ይምረጡ</label>
                <select id="sectionSelect">
                    <option value="">-- Choose Section --</option>
                    <option value="A">Section A</option>
                    <option value="B">Section B</option>
                    <option value="C">Section C</option>
                    <option value="D">Section D</option>
                    <option value="E">Section E</option>
                    <option value="F">Section F</option>
                    <option value="G">Section G</option>
                    <option value="H">Section H</option>
                    <option value="I">Section I</option>
                    <option value="J">Section J</option>
                    <option value="K">Section K</option>
                    <option value="L">Section L</option>
                    <option value="M">Section M</option>
                    <option value="N">Section N</option>
                </select>
            </div>

            <div class="days-grid">
                <button class="day-btn" onclick="showSchedule('Monday')">Monday</button>
                <button class="day-btn" onclick="showSchedule('Tuesday')">Tuesday</button>
                <button class="day-btn" onclick="showSchedule('Wednesday')">Wednesday</button>
                <button class="day-btn" onclick="showSchedule('Thursday')">Thursday</button>
                <button class="day-btn" onclick="showSchedule('Friday')">Friday</button>
            </div>

            <div id="scheduleDisplay" class="result-card">
                <div class="initial-msg">
                    <h3>Section - Day</h3>
                    <p>ቀን በመምረጥ ፕሮግራሙን ይመልከቱ።</p>
                </div>
            </div>
        </main>

        <footer class="author-card">
            <p><strong>Meseret T.</strong></p>
            <p><strong>ID: 1784/18</strong></p>
            <p><strong>Wollo University</strong></p>
            <p><strong>KIOT</strong></p>
            <div class="note">ይህ ኮድ ለ KIOT freshman student የተዘጋጀ የራሴ ፈጠራ ነው።</div>
        </footer>
    </div>

    <script src="script.js"></script>

    <script>
        // ሰርቪስ ወርከሩን ለመመዝገብ
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Registration Failed', err));
            });
        }

        // ቀን ሲመረጥ ዳታውን የሚያሳይ ፋንክሽን
        function showSchedule(day) {
            const section = document.getElementById('sectionSelect').value;
            const display = document.getElementById('scheduleDisplay');
            
            if (!section) {
                alert("እባክዎን መጀመሪያ ሴክሽን ይምረጡ!");
                return;
            }

            const data = scheduleData[section][day];
            let html = `<h3>Section ${section} - ${day}</h3>`;
            
            if (data && data.length > 0) {
                html += "<ul>";
                data.forEach(item => {
                    html += `<li><strong>${item.c}</strong> | ${item.t} | Room: ${item.r}</li>`;
                });
                html += "</ul>";
            } else {
                html += "<p>ለዚህ ቀን ምንም ክፍለ ጊዜ የለም።</p>";
            }
            
            display.innerHTML = html;
        }
    </script>
</body>
</html>
