    <title>Wollo Uni - Info Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            background-color: white;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #1e88e5; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #1e88e5;
            font-size: 16px;
            margin-bottom: 20px;
            background: white;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .day-btn {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .day-btn:hover { background-color: #1565c0; }

        .info-box {
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
            min-height: 180px;
            margin-bottom: 20px;
            text-align: left;
        }
        .info-box h3 { color: #1e88e5; text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        
        .schedule-item {
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        .item-main { display: flex; justify-content: space-between; font-weight: bold; }
        .item-sub { font-size: 12px; color: #666; display: flex; justify-content: space-between; }
        .time { color: #e74c3c; }
        .room { color: #27ae60; }

        .footer-card {
            background-color: #e3f2fd;
            border: 1px dashed #1e88e5;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>

        document.getElementById('displayTitle').innerHTML = `Section ${sec} - ${day}`;

        const schedule = sectionData[sec] ? sectionData[sec][day] : null;

            schedule.forEach(item => {
                html += `
                    <div class="schedule-item">
                        <div class="item-main">
                            <span>${item[1]}</span>
                            <span class="time">${item[0]}</span>
                        </div>
                        <div class="item-sub">
                            <span>${item[2]}</span>
                            <span class="room">Room: ${item[3]}</span>
                        </div>
                    </div>`;
            });
