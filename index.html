<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wollo Uni Info Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Wollo Uni Info Hub</h1>
        <p class="coc-title">Software Engineering Dept Entry Project</p>
        
        <p class="amharic-title">ሴክሽን ይምረጡ</p>

            <option value="">-- Choose Section --</option>
            <option value="A">Section A</option>
            <option value="B">Section B</option>

            <option value="F">Section F</option>

            <option value="L">Section L</option>

            <option value="N">Section N</option>

        <div class="day-selector">

            <button class="day-btn">Wednesday</button>
            <button class="day-btn">Thursday</button>
