<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wollo Uni Info Hub</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d47a1">
    <script>
      if('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <img src="icon.png" alt="WU Logo" class="logo">
            <h1 class="title-blue">Wollo University</h1>
            <h2 class="subtitle">KIOT</h2>
            <p class="tagline">Freshman Student Info Hub</p>
        </header>

        <div class="selection-box">
            <select id="sectionSelect" onchange="resetDisplay()">
                <option value="" disabled selected>ሴክሽን ይምረጡ</option>
                <option value="A">Section A</option>
                <option value="B">Section B</option>
                <option value="C">Section C</option>
                <option value="D">Section D</option>
                <option value="E">Section E</option>
                <option value="F">Section F</option>
                <option value="G">Section G</option>
                <option value="H">Section H</option>
                <option value="I">Section I</option>
                <option value="J">Section J</option>
                <option value="K">Section K</option>
                <option value="L">Section L</option>
                <option value="M">Section M</option>
                <option value="N">Section N</option>
            </select>
        </div>

        <div class="button-group">
            <button class="day-btn" onclick="showSchedule('Monday')">Mon</button>
            <button class="day-btn" onclick="showSchedule('Tuesday')">Tue</button>
            <button class="day-btn" onclick="showSchedule('Wednesday')">Wed</button>
            <button class="day-btn" onclick="showSchedule('Thursday')">Thu</button>
            <button class="day-btn" onclick="showSchedule('Friday')">Fri</button>
        </div>

        <div id="scheduleDisplay" class="display-card">
            <h3 id="displayTitle">ፕሮግራም</h3>
            <div class="line"></div>
            <div id="displayText">ቀን በመምረጥ ፕሮግራሙን ይመልከቱ።</div>
        </div>

        <footer>
            <div class="footer-line"></div>
            <div class="user-info">
                <p class="highlight-name">Meseret T.</p>
                <p class="highlight-id">ID: 1784/18</p>
                <p>Wollo University | KIOT</p>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
