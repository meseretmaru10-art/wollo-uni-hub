<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wollo Uni Info Hub - KIOT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1>Wollo University</h1>
            <h2>Kombolcha Institute of Technology (KIOT)</h2>
            <p>Freshman Student Info Hub</p>
        </header>

        <main>
            <div class="selection-group">
                <label>ሴክሽን ይምረጡ</label>
                <select id="sectionSelect">
                    <option value="">-- Choose Section --</option>
                    <option value="A">Section A</option>
                    <option value="B">Section B</option>
                    <option value="C">Section C</option>
                    <option value="D">Section D</option>
                    <option value="E">Section E</option>
                    <option value="F">Section F</option>
                    <option value="G">Section G</option>
                    <option value="H">Section H</option>
                    <option value="I">Section I</option>
                    <option value="J">Section J</option>
                    <option value="K">Section K</option>
                    <option value="L">Section L</option>
                    <option value="M">Section M</option>
                    <option value="N">Section N</option>
                </select>
            </div>

            <div class="days-grid">
                <button class="day-btn" onclick="showSchedule('Monday')">Monday</button>
                <button class="day-btn" onclick="showSchedule('Tuesday')">Tuesday</button>
                <button class="day-btn" onclick="showSchedule('Wednesday')">Wednesday</button>
                <button class="day-btn" onclick="showSchedule('Thursday')">Thursday</button>
                <button class="day-btn" onclick="showSchedule('Friday')">Friday</button>
            </div>

            <div id="scheduleDisplay" class="result-card">
                <div class="initial-msg">
                    <h3>Section - Day</h3>
                    <p>ቀን በመምረጥ ፕሮግራሙን ይመልከቱ።</p>
                </div>
            </div>
        </main>

        <footer class="author-card">
            <p><strong>Meseret T.</strong></p>
            <p><strong>ID: 1784/18</strong></p>
            <p><strong>Wollo University</strong></p>
            <p><strong>KIOT - Software Engineering Applicant</strong></p>
            <div class="note">ይህ ኮድ ለ KIOT freshman student የተዘጋጀ የራሴ ፈጠራ ነው።</div>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
